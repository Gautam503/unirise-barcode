{% extends "base.html" %}

{% block content %}

<h2 class="fw-bold mb-4">All Products</h2>

<div class="row">
{% for product in products %}
  <div class="col-md-4">
    <div class="card mb-4 h-100">
      {% if product.image %}
      <img src="{{ url_for('static', filename='uploads/' + product.image) }}"
           class="card-img-top"
           style="height:220px; object-fit:contain; padding:15px;">
      {% endif %}
      <div class="card-body">
        <h5>{{ product.name }}</h5>
        <p class="text-muted">{{ product.description[:100] }}...</p>
        <a href="/product/{{ product.id }}" class="btn btn-primary w-100">
          View Details
        </a>
      </div>
    </div>
  </div>
{% endfor %}
</div>

{% endblock %}
