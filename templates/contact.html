{% extends "base.html" %}

{% block content %}

<h2 class="fw-bold mb-4">Contact Us</h2>

<div class="container mt-5">

  <div class="row align-items-stretch">

    <!-- LEFT CONTACT CARD -->
    <div class="col-lg-5 mb-4">
      <div class="card contact-card p-4 h-100">
        <h4>Unirise Barcode</h4>
        <p>Industrial Barcode & QR Code Solutions Provider in India.</p>
        <hr>
        <p><strong>Phone:</strong> +91-8920562293</p>
        <p><strong>Email:</strong> info@unirisebarcode.com</p>
        <p><strong>Location:</strong> India</p>
        <hr>
        <p>We respond within 24 hours.</p>
      </div>
    </div>

    <!-- RIGHT ENQUIRY FORM -->
    <div class="col-lg-7 mb-4">
      <div class="card p-4 h-100">
        <h4 class="mb-3">Send Enquiry</h4>
        <form>
          <input class="form-control mb-3" placeholder="Your Name">
          <input class="form-control mb-3" placeholder="Your Email">
          <input class="form-control mb-3" placeholder="Mobile Number">
          <textarea class="form-control mb-3" rows="4" placeholder="Your Requirement"></textarea>
          <button class="btn btn-primary w-100">Submit Enquiry</button>
        </form>
      </div>
    </div>

  </div>

</div>

{% endblock %}
