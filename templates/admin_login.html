{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">

        <h3 class="mb-4 text-center">Admin Login</h3>

        <form method="POST">
            <input type="text"
                   class="form-control mb-3"
                   name="username"
                   placeholder="Username"
                   required>

            <input type="password"
                   class="form-control mb-3"
                   name="password"
                   placeholder="Password"
                   required>

            <button class="btn btn-dark w-100">
                Login
            </button>
        </form>

    </div>
</div>

{% endblock %}
