{% extends "base.html" %}
{% block title %}{{ product.name }} | Unirise Barcode{% endblock %}
{% block content %}

<div class="row">

    <div class="col-md-6">
        {% if product.image %}
        <img src="{{ url_for('static', filename='uploads/' + product.image) }}"
             class="img-fluid rounded shadow">
        {% endif %}
    </div>

    <div class="col-md-6">
        <h2 class="fw-bold">{{ product.name }}</h2>
        <p class="mt-3">{{ product.description }}</p>

        <a href="https://wa.me/918920562293?text={{ ('Hello I am interested in ' ~ product.name)|urlencode }}"
           class="btn btn-success mt-3"
           target="_blank">
           Enquire on WhatsApp
        </a>
    </div>

</div>

{% endblock %}
