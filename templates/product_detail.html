{% extends "base.html" %}
{% block title %}{{ product.name }} | Unirise Barcode{% endblock %}
{% block content %}

<div class="container mt-5">
  <div class="row align-items-start">

    <!-- LEFT SIDE IMAGE -->
    <div class="col-lg-6 mb-4">
      <div class="card p-3 shadow-sm">
        <img src="{{ url_for('static', filename='uploads/' + product.image) }}"
             class="img-fluid rounded"
             alt="{{ product.name }}">
      </div>
    </div>

    <!-- RIGHT SIDE DETAILS -->
    <div class="col-lg-6">

      <h2 class="fw-bold mb-3">{{ product.name }}</h2>

      <p class="text-muted">
        {{ product.description }}
      </p>

      <hr>

      <h5 class="fw-bold mt-4">Product Enquiry</h5>

      <form method="POST" action="/product-enquiry" class="mt-3">
        <div class="mb-3">
          <input type="text" name="name"
                 class="form-control"
                 placeholder="Your Name" required>
        </div>

        <div class="mb-3">
          <input type="text" name="phone"
                 class="form-control"
                 placeholder="Phone Number" required>
        </div>

        <button type="submit"
                class="btn btn-primary w-100">
          Send Enquiry
        </button>
      </form>

    </div>

  </div>
</div>

{% endblock %}
